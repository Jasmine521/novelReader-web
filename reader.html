<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>小说阅读</title><style>
:root{--bg:#101116;--panel:#181a22;--text:#e8e5df;--muted:#9996a0;--line:#2b2d38;--accent:#d2a55e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:17px/1.9 Georgia,"Microsoft YaHei",serif}button{color:var(--text);background:var(--panel);border:1px solid var(--line);padding:9px 13px;border-radius:8px;cursor:pointer}.layout{display:grid;grid-template-columns:300px 1fr;min-height:100vh}aside{border-right:1px solid var(--line);height:100vh;position:sticky;top:0;overflow:auto;padding:22px}.brand{color:var(--accent);font-weight:700}.book{font:700 19px/1.35 Georgia;margin:14px 0}.list{display:grid;gap:3px}.list button{text-align:left;border:0;background:transparent;color:var(--muted)}.list button.active{color:var(--accent);background:var(--panel)}main{width:min(800px,calc(100% - 30px));margin:0 auto;padding:28px 0 70px}.toolbar{display:flex;gap:8px;align-items:center}.toolbar a{margin-left:auto;color:var(--muted);text-decoration:none}.title{margin:42px 0 4px;font-size:30px}.en{color:var(--muted);font-size:14px}.toggle{display:flex;gap:6px;margin:20px 0}.toggle button.active{border-color:var(--accent);color:var(--accent)}article p{margin:0 0 1.15em}.nav{display:flex;justify-content:space-between;margin-top:45px}@media(max-width:760px){.layout{display:block}aside{position:static;height:auto;border:0;border-bottom:1px solid var(--line)}.list{max-height:180px;overflow:auto}}
</style></head><body><div class="layout"><aside><div class="brand">Novel Reader</div><div class="book" id="bookTitle">加载中…</div><div class="list" id="list"></div></aside><main><div class="toolbar"><button onclick="move(-1)">← 上一章</button><button onclick="move(1)">下一章 →</button><a id="graphLink">查看图谱</a><a href="rankings.html">返回排行榜</a></div><h1 class="title" id="title"></h1><div class="en" id="enTitle"></div><div class="toggle"><button data-lang="cn">中文</button><button data-lang="en">English</button><button data-lang="both">双语</button></div><article id="content">请选择章节</article><div class="nav"><button onclick="move(-1)">← 上一章</button><button onclick="move(1)">下一章 →</button></div></main></div><script>
const q=new URLSearchParams(location.search),slug=q.get('book'),state={index:[],at:-1,data:null,lang:localStorage.getItem('multi-reader-lang')||'cn'};graphLink.href=`graph.html?book=${encodeURIComponent(slug||'')}`;const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const paragraphs=s=>(s||'').split(/\n\s*\n/).filter(Boolean).map(p=>`<p>${esc(p).replace(/\n/g,'<br>')}</p>`).join('')||'<p>暂无内容</p>';
function draw(){if(!state.data)return;const d=state.data;title.textContent=d.title_cn||`第${d.num}章`;enTitle.textContent=d.title_en||'';content.innerHTML=state.lang==='cn'?paragraphs(d.content_cn):state.lang==='en'?paragraphs(d.content_en):paragraphs(d.content_cn)+'<hr>'+paragraphs(d.content_en);document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('active',b.dataset.lang===state.lang))}
async function load(i){if(i<0||i>=state.index.length)return;state.at=i;state.data=await fetch(state.index[i].file).then(r=>r.json());draw();document.querySelectorAll('.list button').forEach((b,j)=>b.classList.toggle('active',i===j));scrollTo(0,0)}function move(n){load(state.at+n)}
document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{state.lang=b.dataset.lang;localStorage.setItem('multi-reader-lang',state.lang);draw()});
Promise.all([fetch('library/index.json').then(r=>r.json()),fetch(`library/${encodeURIComponent(slug)}/chapters_index.json`).then(r=>r.json())]).then(([books,idx])=>{const book=books.find(b=>b.slug===slug);bookTitle.textContent=book?.title||slug;document.title=(book?.title||slug)+' · Novel Reader';state.index=idx;list.innerHTML=idx.map((c,i)=>`<button onclick="load(${i})">${esc(c.title_cn||c.title_en||'Chapter '+c.num)}</button>`).join('');if(idx.length)load(0)}).catch(e=>content.textContent='加载失败：'+e.message);
</script></body></html>
