<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>3D 小说知识图谱</title><style>
:root{--bg:#07090e;--panel:#11151ded;--line:#29303d;--text:#e9edf5;--muted:#8d98aa;--accent:#e0ae62}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at center,#111827 0,#07090e 68%);color:var(--text);font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;cursor:grab}.top,.panel,.legend,.help{position:fixed;z-index:3;background:var(--panel);border:1px solid var(--line);border-radius:13px;backdrop-filter:blur(14px);box-shadow:0 12px 35px #0008}.top{left:16px;right:16px;top:14px;padding:8px 11px;display:flex;align-items:center;gap:8px}.brand{font-weight:800}.brand b{color:var(--accent)}.tools{margin-left:auto;display:flex;gap:7px}input,select,button,a{border:1px solid var(--line);background:#191e29;color:var(--text);padding:8px 10px;border-radius:8px;text-decoration:none}input{width:210px}.panel{right:16px;top:75px;width:min(360px,calc(100% - 32px));max-height:calc(100% - 150px);overflow:auto;padding:18px;transform:translateX(calc(100% + 25px));transition:.22s}.panel.open{transform:none}.panel h2{margin:0}.en{color:var(--muted)}dl{display:grid;grid-template-columns:75px 1fr;gap:7px}dd{margin:0}.rel{border:1px solid var(--line);padding:8px;border-radius:8px;margin:6px 0;color:var(--muted)}.rel b{color:var(--text)}.legend{left:16px;bottom:16px;padding:10px;display:flex;gap:12px;flex-wrap:wrap}.key{color:var(--muted);font-size:12px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}.status{position:fixed;left:18px;top:70px;color:var(--muted);z-index:2}.help{right:16px;bottom:16px;padding:9px 12px;color:var(--muted);font-size:12px}@media(max-width:760px){.top{flex-wrap:wrap}.tools{width:100%;margin:0;overflow:auto}.tools input{min-width:150px;flex:1}.status{top:120px}.help{display:none}}
</style></head><body><canvas id="canvas"></canvas><header class="top"><div class="brand"><b>3D GRAPH</b> · <span id="bookName">知识图谱</span></div><div class="tools"><input id="search" placeholder="搜索实体、别名…"><select id="type"><option value="all">全部类型</option></select><select id="viewMode"><option value="center">中心视角</option><option value="free">自由视角</option></select><button id="reset">重置</button><a id="back">返回阅读</a></div></header><div class="status" id="status">加载中…</div><aside class="panel" id="panel"><button onclick="panel.classList.remove('open')" style="float:right">×</button><h2 id="name"></h2><div class="en" id="english"></div><dl id="meta"></dl><div id="rels"></div></aside><div class="legend" id="legend"></div><div class="help" id="help">拖拽旋转 · 滚轮缩放 · Alt/中键平移</div><script>
const COLORS={PERSON:'#f1b86b',PLACE:'#62b6ff',ORGANIZATION:'#bb86fc',ITEM:'#69d6a3',SKILL:'#ff758f',OTHER:'#9aa5b7'};
const q=new URLSearchParams(location.search),book=q.get('book'),cv=canvas,ctx=cv.getContext('2d');
const S={nodes:[],edges:[],shown:[],lines:[],yaw:0,pitch:-.18,distance:1050,target:{x:0,y:0,z:0},mode:'center',drag:null,gesture:null,lx:0,ly:0,selected:null,filter:'all',query:'',active:true,projected:[]};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}onresize=resize;resize();back.href=`reader.html?book=${encodeURIComponent(book||'')}`;
function rotatePoint(n){let x=n.x-S.target.x,y=n.y-S.target.y,z=n.z-S.target.z,cy=Math.cos(S.yaw),sy=Math.sin(S.yaw),cp=Math.cos(S.pitch),sp=Math.sin(S.pitch);let x1=x*cy-z*sy,z1=x*sy+z*cy,y1=y*cp-z1*sp,z2=y*sp+z1*cp;return{x:x1,y:y1,z:z2}}
function project(n){let r=rotatePoint(n),depth=Math.max(80,S.distance+r.z),f=Math.min(innerWidth,innerHeight)*1.05,scale=f/depth;return{node:n,x:innerWidth/2+r.x*scale,y:innerHeight/2+r.y*scale,z:r.z,scale,depth}}
function resetView(){S.yaw=0;S.pitch=-.18;S.target={x:0,y:0,z:0};const radius=Math.max(260,Math.sqrt(Math.max(1,S.nodes.length))*18);S.distance=radius*2.45;S.mode=viewMode.value;S.active=true}
function seed(){const n=Math.max(1,S.nodes.length),radius=Math.min(560,Math.max(190,Math.cbrt(n)*48));S.nodes.forEach((node,i)=>{const t=(i+.5)/n,phi=Math.acos(1-2*t),theta=i*2.399963,nodeRadius=radius*Math.cbrt(t);node.x=Math.sin(phi)*Math.cos(theta)*nodeRadius;node.y=Math.cos(phi)*nodeRadius;node.z=Math.sin(phi)*Math.sin(theta)*nodeRadius;node.vx=node.vy=node.vz=0})}
function apply(){let v=S.query.toLowerCase();S.shown=S.nodes.filter(n=>(S.filter==='all'||n.type===S.filter)&&(!v||n.search.includes(v)));let ids=new Set(S.shown.map(n=>n.id));S.lines=S.edges.filter(e=>ids.has(e.a.id)&&ids.has(e.b.id));status.textContent=`${S.shown.length} 个实体 · ${S.lines.length} 条关系 · ${S.mode==='center'?'中心':'自由'}视角`;S.active=true}
function physics(){if(!S.active)return;const nodes=S.shown,bound=Math.max(270,Math.cbrt(Math.max(1,nodes.length))*58);for(const e of S.lines){let dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,dz=e.b.z-e.a.z,d=Math.hypot(dx,dy,dz)||1,f=Math.max(-.08,Math.min(.08,(d-105)*.0012));dx=dx/d*f;dy=dy/d*f;dz=dz/d*f;e.a.vx+=dx;e.a.vy+=dy;e.a.vz+=dz;e.b.vx-=dx;e.b.vy-=dy;e.b.vz-=dz}for(let i=0;i<nodes.length;i++){let a=nodes[i],rad=Math.hypot(a.x,a.y,a.z)||1;a.vx-=a.x*.0005;a.vy-=a.y*.0005;a.vz-=a.z*.0005;if(rad>bound){let f=Math.min(.18,(rad-bound)*.002);a.vx-=a.x/rad*f;a.vy-=a.y/rad*f;a.vz-=a.z/rad*f}for(let j=i+1;j<nodes.length;j++){let b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z,d=Math.hypot(dx,dy,dz)||.1;if(d<75){let f=Math.min(.055,22/(d*d)+(d<18?(18-d)*.003:0));dx=dx/d*f;dy=dy/d*f;dz=dz/d*f;a.vx-=dx;a.vy-=dy;a.vz-=dz;b.vx+=dx;b.vy+=dy;b.vz+=dz}}}let energy=0;for(const n of nodes){if(n!==S.drag){n.vx=Math.max(-2,Math.min(2,n.vx*.84));n.vy=Math.max(-2,Math.min(2,n.vy*.84));n.vz=Math.max(-2,Math.min(2,n.vz*.84));n.x+=n.vx;n.y+=n.vy;n.z+=n.vz}energy+=Math.abs(n.vx)+Math.abs(n.vy)+Math.abs(n.vz)}if(energy<nodes.length*.012)S.active=false}
function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);S.projected=S.shown.map(project).sort((a,b)=>b.depth-a.depth);const pm=new Map(S.projected.map(p=>[p.node,p]));for(const e of S.lines){let a=pm.get(e.a),b=pm.get(e.b);if(!a||!b)continue;let alpha=Math.max(.035,Math.min(.35,(a.scale+b.scale)*.16));ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=S.selected&&(e.a===S.selected||e.b===S.selected)?`rgba(224,174,98,${Math.max(.35,alpha)})`:`rgba(99,112,136,${alpha})`;ctx.stroke()}for(const p of S.projected){let n=p.node,sel=n===S.selected,r=Math.max(1.8,Math.min(13,(sel?11:5+Math.sqrt(Math.min(12,n.degree)))*p.scale));ctx.globalAlpha=Math.max(.28,Math.min(1,.35+p.scale*.8));ctx.beginPath();ctx.arc(p.x,p.y,r,0,7);ctx.fillStyle=COLORS[n.type]||COLORS.OTHER;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=sel?24:Math.min(9,r);ctx.fill();ctx.shadowBlur=0;if(sel||p.scale>1.15){ctx.globalAlpha=1;ctx.fillStyle='#e9edf5';ctx.font=`${sel?13:11}px system-ui`;ctx.fillText(n.cn||n.en,p.x+r+4,p.y+4)}}ctx.globalAlpha=1}
function loop(){physics();draw();requestAnimationFrame(loop)}
function hit(x,y){let best=null,d=20;for(const p of S.projected){let z=Math.hypot(p.x-x,p.y-y);if(z<d){d=z;best=p}}return best}
function show(n){S.selected=n;panel.classList.add('open');name.textContent=n.cn||n.en;english.textContent=n.en;meta.innerHTML=`<dt>类型</dt><dd>${esc(n.type)}</dd><dt>别名</dt><dd>${esc((n.aliases||[]).join('、')||'—')}</dd><dt>章节</dt><dd>${n.first_chapter||'?'} ～ ${n.last_chapter||'?'}</dd><dt>描述</dt><dd>${esc(n.description||'暂无')}</dd>`;let rs=S.edges.filter(e=>e.a===n||e.b===n);rels.innerHTML='<h3>关系 · '+rs.length+'</h3>'+rs.map(e=>{let o=e.a===n?e.b:e.a;return`<div class="rel"><b>${esc(e.type)}</b> → ${esc(o.cn||o.en)}<br>${esc(e.description||'')}</div>`}).join('')}
function pan(dx,dy){let speed=S.distance/700,cy=Math.cos(S.yaw),sy=Math.sin(S.yaw),cp=Math.cos(S.pitch),sp=Math.sin(S.pitch);S.target.x-=dx*speed*cy;S.target.z+=dx*speed*sy;S.target.x+=dy*speed*sy*sp;S.target.y-=dy*speed*cp;S.target.z+=dy*speed*cy*sp}
cv.onpointerdown=e=>{let p=hit(e.clientX,e.clientY);S.lx=e.clientX;S.ly=e.clientY;if(p){S.drag=p.node;show(p.node)}else S.gesture=(e.altKey||e.button===1)?'pan':'orbit';cv.setPointerCapture(e.pointerId)};
cv.onpointermove=e=>{let dx=e.clientX-S.lx,dy=e.clientY-S.ly;if(S.drag){let speed=S.distance/700,cy=Math.cos(S.yaw),sy=Math.sin(S.yaw);S.drag.x+=dx*speed*cy;S.drag.z-=dx*speed*sy;S.drag.y+=dy*speed;S.active=true}else if(S.gesture==='orbit'){S.yaw+=dx*.006;S.pitch=Math.max(-1.45,Math.min(1.45,S.pitch+dy*.005))}else if(S.gesture==='pan'&&S.mode==='free')pan(dx,dy);S.lx=e.clientX;S.ly=e.clientY};cv.onpointerup=()=>{S.drag=null;S.gesture=null};cv.onpointercancel=cv.onpointerup;
cv.onwheel=e=>{e.preventDefault();S.distance=Math.max(180,Math.min(5000,S.distance*Math.exp(e.deltaY*.001)))},{passive:false};
addEventListener('keydown',e=>{if(S.mode!=='free'||/INPUT|SELECT/.test(document.activeElement.tagName))return;let d=S.distance*.035;if(e.key.toLowerCase()==='w')S.target.z-=d;if(e.key.toLowerCase()==='s')S.target.z+=d;if(e.key.toLowerCase()==='a')S.target.x-=d;if(e.key.toLowerCase()==='d')S.target.x+=d;if(e.key.toLowerCase()==='q')S.target.y-=d;if(e.key.toLowerCase()==='e')S.target.y+=d});
reset.onclick=resetView;search.oninput=e=>{S.query=e.target.value.trim();apply()};type.onchange=e=>{S.filter=e.target.value;apply()};viewMode.onchange=e=>{S.mode=e.target.value;if(S.mode==='center')S.target={x:0,y:0,z:0};help.textContent=S.mode==='center'?'拖拽环绕中心 · 滚轮缩放':'拖拽环绕 · Alt/中键平移 · WASD/QE 移动';apply()};
Promise.all([fetch('library/index.json').then(r=>r.json()),fetch(`library/${encodeURIComponent(book)}/knowledge_graph.json`).then(r=>r.json())]).then(([books,g])=>{let b=books.find(v=>v.slug===book);bookName.textContent=b?.title||book;document.title=(b?.title||book)+' · 3D 知识图谱';S.nodes=(g.entities||[]).map((e,i)=>({...e,id:e.en||e.cn||String(i),type:e.type||'OTHER',search:[e.en,e.cn,...(e.aliases||[])].join(' ').toLowerCase(),degree:0}));let map=new Map(S.nodes.map(n=>[(n.en||'').toLowerCase(),n]));S.edges=(g.relationships||[]).map(r=>({a:map.get((r.source_en||'').toLowerCase()),b:map.get((r.target_en||'').toLowerCase()),...r})).filter(e=>e.a&&e.b);S.edges.forEach(e=>{e.a.degree++;e.b.degree++});[...new Set(S.nodes.map(n=>n.type))].sort().forEach(t=>{type.insertAdjacentHTML('beforeend',`<option>${esc(t)}</option>`);legend.insertAdjacentHTML('beforeend',`<span class="key"><i class="dot" style="background:${COLORS[t]||COLORS.OTHER}"></i>${esc(t)}</span>`)});seed();resetView();apply();loop()}).catch(e=>status.textContent='加载失败：'+e.message);
</script></body></html>
