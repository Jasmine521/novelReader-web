<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>跨平台小说排行榜 · Novel Reader</title>
  <style>
    :root{--bg:#0c0e13;--panel:#151922;--panel2:#1b202b;--text:#edf0f7;--muted:#929bad;--line:#292f3d;--accent:#d9a85f;--blue:#71a8ff;--green:#68d391}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% -10%,#332514 0,transparent 32%),var(--bg);color:var(--text);font:15px/1.55 system-ui,"Microsoft YaHei",sans-serif}
    a{color:inherit;text-decoration:none}.shell{width:min(1240px,calc(100% - 32px));margin:auto}.topbar{display:flex;align-items:center;gap:16px;padding:22px 0}.brand{font:700 20px Georgia,serif}.back{margin-left:auto;padding:9px 14px;border:1px solid var(--line);border-radius:10px;color:var(--muted)}
    .hero{padding:48px 0 30px}.eyebrow{color:var(--accent);letter-spacing:.16em;font-size:12px;font-weight:800}.hero h1{font:700 clamp(34px,6vw,68px)/1.05 Georgia,"Microsoft YaHei",serif;margin:12px 0;max-width:820px}.hero p{max-width:750px;color:var(--muted);font-size:16px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0}.stat,.controls,.method,.item{background:color-mix(in srgb,var(--panel) 92%,transparent);border:1px solid var(--line);border-radius:16px}.stat{padding:18px}.stat b{display:block;font-size:26px}.stat span{color:var(--muted);font-size:12px}
    .controls{display:grid;grid-template-columns:1fr 190px 190px;gap:12px;padding:14px;position:sticky;top:10px;z-index:5;backdrop-filter:blur(14px)}input,select{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:11px 12px;border-radius:10px;outline:none}
    .method{padding:18px 20px;margin:16px 0;color:var(--muted)}.method summary{cursor:pointer;color:var(--text);font-weight:700}.method p{margin:12px 0 0}
    .list{display:grid;gap:10px;padding-bottom:60px}.item{display:grid;grid-template-columns:56px 1fr 260px 88px;align-items:center;gap:16px;padding:14px 18px;transition:.2s}.item:hover{transform:translateY(-2px);border-color:#4a5366}.rank{font:700 24px Georgia;color:var(--muted)}.rank.top{color:var(--accent)}
    .title{font-weight:750;font-size:16px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px;color:var(--muted);font-size:12px}.tag{border:1px solid var(--line);padding:2px 7px;border-radius:99px}.source-platform{color:var(--blue)}.source-computed{color:var(--green)}
    .barbox small{display:flex;justify-content:space-between;color:var(--muted)}.bar{height:7px;background:#292e39;border-radius:99px;overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),#f2cf91)}.score{text-align:right;font:700 24px Georgia}.empty{text-align:center;color:var(--muted);padding:50px}
    footer{border-top:1px solid var(--line);padding:22px 0 40px;color:var(--muted);font-size:12px}
    @media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1fr;position:static}.item{grid-template-columns:38px 1fr 62px}.barbox{display:none}.hero{padding-top:25px}.shell{width:min(100% - 20px,1240px)}}
  </style>
</head>
<body>
  <header class="shell topbar"><div class="brand">Novel Reader</div><span style="color:var(--muted)">/ 发现</span><a class="back" href="usage.html">API 用量</a><a class="back" style="margin-left:0" href="index.html">返回阅读器</a></header>
  <main class="shell">
    <section class="hero"><div class="eyebrow">DISCOVER · 跨平台书单</div><h1>找到下一本值得读的小说</h1><p>聚合 WebNovelPlus 与 Revenger Novels 的公开书目。平台有评分时采用平台评分；没有评分时，以章节规模、榜单位置和曝光度生成透明的推荐分。</p></section>
    <section class="stats"><div class="stat"><b id="total">—</b><span>收录小说</span></div><div class="stat"><b id="platforms">—</b><span>数据平台</span></div><div class="stat"><b id="rated">—</b><span>平台评分作品</span></div><div class="stat"><b id="updated">—</b><span>数据更新时间</span></div></section>
    <section class="controls"><input id="search" placeholder="搜索小说标题…"><select id="platform"><option value="all">全部平台</option><option value="webnovelplus.com">WebNovelPlus</option><option value="revengernovel.com">Revenger Novels</option></select><select id="source"><option value="all">全部评分来源</option><option value="platform_rating">平台评分</option><option value="computed">自制推荐分</option></select></section>
    <details class="method"><summary>排行榜如何计算？</summary><p id="methodText">正在加载评分说明…</p></details>
    <section class="list" id="list"><div class="empty">正在加载排行榜…</div></section>
  </main>
  <footer><div class="shell">排名是站点公开信息的快照；推荐分衡量活跃度与内容规模，不等同于文学质量。点击作品标题将前往来源站。</div></footer>
  <script>
    const state={data:[],query:'',platform:'all',source:'all'};
    const fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'m':n>=1e3?(n/1e3).toFixed(1)+'k':String(n||0);
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function render(){
      const rows=state.data.filter(n=>(state.platform==='all'||n.platform===state.platform)&&(state.source==='all'||n.score_source===state.source)&&n.title.toLowerCase().includes(state.query));
      document.querySelector('#list').innerHTML=rows.length?rows.map((n,i)=>`<article class="item"><div class="rank ${i<3?'top':''}">${String(i+1).padStart(2,'0')}</div><div><a class="title" href="${esc(n.local_read_url||n.url)}" ${n.local_read_url?'':`target="_blank" rel="noopener noreferrer"`}>${esc(n.title)}</a><div class="meta"><span class="tag">${esc(n.platform)}</span><span>${fmt(n.chapters)} 章</span>${n.views?`<span>${fmt(n.views)} 阅读</span>`:''}<span class="${n.score_source==='platform_rating'?'source-platform':'source-computed'}">${n.score_source==='platform_rating'?'平台评分':'推荐算法'}</span>${n.local_read_url?`<span class="tag source-computed">本地已处理 ${n.local_chapters} 章 · 开始阅读</span>`:''}</div></div><div class="barbox"><small><span>${esc(n.score_label)}</span><span>${n.score}</span></small><div class="bar"><i style="width:${Math.max(0,Math.min(100,n.score))}%"></i></div></div><div class="score">${n.score}</div></article>`).join(''):'<div class="empty">没有符合条件的小说</div>';
    }
    fetch('novels_rankings.json').then(r=>{if(!r.ok)throw Error(r.status);return r.json()}).then(d=>{
      state.data=d.novels||[];document.querySelector('#total').textContent=state.data.length;document.querySelector('#platforms').textContent=new Set(state.data.map(n=>n.platform)).size;document.querySelector('#rated').textContent=state.data.filter(n=>n.score_source==='platform_rating').length;document.querySelector('#updated').textContent=new Date(d.generated_at).toLocaleDateString('zh-CN');document.querySelector('#methodText').textContent=[d.methodology.platform_rating,d.methodology.computed,d.methodology.notice].join(' ');render();
    }).catch(e=>document.querySelector('#list').innerHTML=`<div class="empty">排行榜加载失败：${esc(e.message)}<br>请通过 HTTP 服务打开页面，并先运行 rankings_scraper.py。</div>`);
    document.querySelector('#search').addEventListener('input',e=>{state.query=e.target.value.trim().toLowerCase();render()});
    document.querySelector('#platform').addEventListener('change',e=>{state.platform=e.target.value;render()});
    document.querySelector('#source').addEventListener('change',e=>{state.source=e.target.value;render()});
  </script>
</body>
</html>
